<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Dr. Tatianna Gilliam  Enterprise AI, Cloud Architecture, ERP Transformation</title>
  <desc id="desc">Responsive profile hero for GitHub README: charcoal and navy field with gold accent line and positioning copy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10141c"/>
      <stop offset="55%" stop-color="#1a2740"/>
      <stop offset="100%" stop-color="#10141c"/>
    </linearGradient>
    <linearGradient id="glow" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0be68" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e0be68" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <circle cx="980" cy="40" r="180" fill="url(#glow)"/>
  <rect x="64" y="72" width="72" height="4" fill="#e0be68"/>
  <text x="64" y="130" fill="#f4f4f0" font-family="Georgia, 'Times New Roman', serif" font-size="44">Dr. Tatianna Gilliam</text>
  <text x="64" y="178" fill="#d7deea" font-family="Segoe UI, Candara, Calibri, sans-serif" font-size="24">Enterprise AI &amp; Cloud Architect</text>
  <text x="64" y="220" fill="#c3ccd9" font-family="Segoe UI, Candara, Calibri, sans-serif" font-size="18">ERP Transformation · Governed Agents · Human-in-the-Loop Systems</text>
  <text x="64" y="278" fill="#e0be68" font-family="Segoe UI, Candara, Calibri, sans-serif" font-size="16" letter-spacing="2">BUILD THE SYSTEM · PROVE THE WORK</text>
  <rect x="64" y="300" width="240" height="2" fill="#6f86a8" opacity="0.8"/>
</svg>
